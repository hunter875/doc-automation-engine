      thoi_gian_khong_che:
        aliases: ["THỜI GIAN KHỐNG CHẾ", "Thời gian khống chế"]
        type: string
      thoi_gian_dap_tat:
        aliases: ["THỜI GIAN DẬP TẮT HOÀN TOÀN", "Thời gian dập tắt hoàn toàn", "THỜI GIAN DẬP TẮT"]
        type: string
      so_luong_xe:
        aliases: ["SỐ LƯỢNG XE", "Số lượng xe", "SỐ XE"]
        type: integer
      chi_huy:
        aliases: ["CHỈ HUY CHỮA CHÁY", "Chỉ huy chữa cháy", "CHỈ HUY"]
        type: string
      ghi_chu:
        aliases: ["GHI CHÚ", "Ghi chú"]
        type: string
