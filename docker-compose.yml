services:
  # ============================================================================
  # FastAPI Application (Defines reusable environment anchor)
  # ============================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app/app
    ports:
      - "8000:8000"
    environment: &base-env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpassword}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-rag-documents}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      EXTRACTION_BACKEND: ${EXTRACTION_BACKEND:-ollama}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      EXTRACTION_MAX_TOKENS: ${EXTRACTION_MAX_TOKENS:-65536}
      SECRET_KEY: ${JWT_SECRET_KEY:-change-this-in-production-use-256-bit-key}
      DEBUG: ${DEBUG:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-ollama}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-90}
      CORS_ORIGINS: ${CORS_ORIGINS:-["*"]}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-10}
      FILE_OPERATOR_ENABLED: ${FILE_OPERATOR_ENABLED:-true}
      FILE_OPERATOR_POLL_SECONDS: ${FILE_OPERATOR_POLL_SECONDS:-120}
      FILE_OPERATOR_INBOX_PREFIX: ${FILE_OPERATOR_INBOX_PREFIX:-inbox/}
      FILE_OPERATOR_PROCESSED_PREFIX: ${FILE_OPERATOR_PROCESSED_PREFIX:-processed/}
      BATCH_CLOSER_POLL_SECONDS: ${BATCH_CLOSER_POLL_SECONDS:-180}
      BATCH_CLOSER_MAX_WAIT_MINUTES: ${BATCH_CLOSER_MAX_WAIT_MINUTES:-60}
      BATCH_CLOSER_AUTO_AGGREGATE: ${BATCH_CLOSER_AUTO_AGGREGATE:-true}
      STUCK_JOB_CLEANUP_POLL_SECONDS: ${STUCK_JOB_CLEANUP_POLL_SECONDS:-30}
      TEST_DATABASE_URL: postgresql+psycopg2://raguser:ragpassword@postgres:5432/rag_test
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - rag-network
    restart: unless-stopped
    user: root
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # ============================================================================
  # Next.js Frontend
  # ============================================================================
  frontend:
    image: node:20-alpine
    container_name: rag-frontend
    working_dir: /app
    command: >
      sh -c "
      if [ ! -d 'node_modules' ]; then
        npm install --legacy-peer-deps;
      fi &&
      npm run dev -- --hostname 0.0.0.0 --port 3000
      "
    volumes:
      - ./frontend:/app
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: development
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
      NEXT_TELEMETRY_DISABLED: 1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api:
        condition: service_started
    networks:
      - rag-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ============================================================================
  # Celery Worker — General Queues
  # ============================================================================
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-celery-worker
    command: celery -A app.infrastructure.worker.celery_app worker --loglevel=info --concurrency=4 -Q default,document_processing,embeddings --hostname=worker-general@%h
    environment: *base-env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rag-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # ============================================================================
  # Celery Extraction Worker — LLM/AI Tasks (Sequential)
  # ============================================================================
  celery-extraction-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-celery-extraction
    command: >
      celery -A app.infrastructure.worker.celery_app worker
      --loglevel=info
      --concurrency=1
      --prefetch-multiplier=1
      -Q extraction
      --hostname=worker-extraction@%h
      --max-tasks-per-child=10
    environment: *base-env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rag-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # ============================================================================
  # Celery Enrichment Worker — Stage-2 LLM Enrichment
  # ============================================================================
  celery-enrichment-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-celery-enrichment
    command: >
      celery -A app.infrastructure.worker.celery_app worker
      --loglevel=info
      --concurrency=2
      --prefetch-multiplier=1
      -Q enrichment
      --hostname=worker-enrichment@%h
      --max-tasks-per-child=10
    environment: *base-env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rag-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # ============================================================================
  # Celery Beat (Scheduler)
  # ============================================================================
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-celery-beat
    command: celery -A app.infrastructure.worker.celery_app beat --loglevel=info
    environment:
      <<: *base-env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - celery-worker
      - celery-extraction-worker
      - celery-enrichment-worker
    networks:
      - rag-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ============================================================================
  # Flower (Celery Monitoring)
  # ============================================================================
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-flower
    command: celery -A app.infrastructure.worker.celery_app flower --port=5555
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    ports:
      - "5555:5555"
    depends_on:
      - celery-worker
      - celery-extraction-worker
    networks:
      - rag-network
    profiles:
      - debug
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ============================================================================
  # PostgreSQL Database with pgvector
  # ============================================================================
  postgres:
    image: pgvector/pgvector:pg15
    container_name: rag-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpassword}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser} -d ${POSTGRES_DB:-ragdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rag-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # ============================================================================
  # Redis (Message Broker & Cache)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rag-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # ============================================================================
  # MinIO (S3-compatible Object Storage)
  # ============================================================================
  minio:
    image: minio/minio:latest
    container_name: rag-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rag-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ============================================================================
  # MinIO Bucket Initialization
  # ============================================================================
  minio-init:
    image: minio/mc:latest
    container_name: rag-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb myminio/${MINIO_BUCKET:-rag-documents} --ignore-existing;
      mc anonymous set download myminio/${MINIO_BUCKET:-rag-documents};
      exit 0;
      "
    networks:
      - rag-network
    restart: "no"

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  rag-network:
    driver: bridge
