services:
  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=raguser
      - POSTGRES_PASSWORD=ragpassword
      - POSTGRES_DB=ragdb
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=rag-documents
      - MINIO_SECURE=false
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_FLASH_MODEL=${GEMINI_FLASH_MODEL:-gemini-2.5-flash}
      - GEMINI_PRO_MODEL=${GEMINI_PRO_MODEL:-gemini-2.5-flash}
      - EXTRACTION_BACKEND=${EXTRACTION_BACKEND:-ollama}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b-instruct}
      - EXTRACTION_MAX_TOKENS=65536
      - SECRET_KEY=${JWT_SECRET_KEY:-your-super-secret-key-change-in-production}
      - DEBUG=true
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - rag-network
    restart: unless-stopped

  # Streamlit UI
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-streamlit
    command: streamlit run ui/streamlit_app.py --server.address 0.0.0.0 --server.port 8501 --server.fileWatcherType poll
    ports:
      - "8501:8501"
    environment:
      - DOC_API_BASE_URL=http://api:8000
      - PYTHONPATH=/app:/app/ui:/app/ui/pages
    depends_on:
      api:
        condition: service_started
    networks:
      - rag-network
    restart: unless-stopped

  # Celery Worker — general queues (document_processing, embeddings, default)
  # concurrency=4 is fine here because these tasks are lightweight I/O ops
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-celery-worker
    command: celery -A app.infrastructure.worker.celery_app worker --loglevel=info --concurrency=4 -Q default,document_processing,embeddings --hostname=worker-general@%h
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=raguser
      - POSTGRES_PASSWORD=ragpassword
      - POSTGRES_DB=ragdb
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=rag-documents
      - MINIO_SECURE=false
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_FLASH_MODEL=${GEMINI_FLASH_MODEL:-gemini-2.5-flash}
      - GEMINI_PRO_MODEL=${GEMINI_PRO_MODEL:-gemini-2.5-flash}
      - EXTRACTION_BACKEND=${EXTRACTION_BACKEND:-ollama}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b-instruct}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - EXTRACTION_MAX_TOKENS=65536
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rag-network
    restart: unless-stopped

  # Celery Extraction Worker — LLM/AI tasks chạy tuần tự 1 file / lượt
  # concurrency=1 đảm bảo chỉ 1 job trích xuất chạy tại một thời điểm,
  # tránh Ollama bị gọi song song gây OOM và CPU spike.
  celery-extraction-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-celery-extraction
    command: >-
      celery -A app.infrastructure.worker.celery_app worker
      --loglevel=info
      --concurrency=1
      --prefetch-multiplier=1
      -Q extraction
      --hostname=worker-extraction@%h
      --max-tasks-per-child=10
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=raguser
      - POSTGRES_PASSWORD=ragpassword
      - POSTGRES_DB=ragdb
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=rag-documents
      - MINIO_SECURE=false
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_FLASH_MODEL=${GEMINI_FLASH_MODEL:-gemini-2.5-flash}
      - GEMINI_PRO_MODEL=${GEMINI_PRO_MODEL:-gemini-2.5-flash}
      - EXTRACTION_BACKEND=${EXTRACTION_BACKEND:-ollama}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b-instruct}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - EXTRACTION_MAX_TOKENS=65536
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rag-network
    restart: unless-stopped

  # Celery Enrichment Worker — dedicated pool for Stage-2 LLM enrichment.
  # Lower concurrency (2) to bound simultaneous Ollama calls.
  celery-enrichment-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-celery-enrichment
    command: >-
      celery -A app.infrastructure.worker.celery_app worker
      --loglevel=info
      --concurrency=2
      --prefetch-multiplier=1
      -Q enrichment
      --hostname=worker-enrichment@%h
      --max-tasks-per-child=10
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=raguser
      - POSTGRES_PASSWORD=ragpassword
      - POSTGRES_DB=ragdb
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=rag-documents
      - MINIO_SECURE=false
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_FLASH_MODEL=${GEMINI_FLASH_MODEL:-gemini-2.5-flash}
      - GEMINI_PRO_MODEL=${GEMINI_PRO_MODEL:-gemini-2.5-flash}
      - EXTRACTION_BACKEND=${EXTRACTION_BACKEND:-ollama}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b-instruct}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - EXTRACTION_MAX_TOKENS=65536
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rag-network
    restart: unless-stopped

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-celery-beat
    command: celery -A app.infrastructure.worker.celery_app beat --loglevel=info
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=raguser
      - POSTGRES_PASSWORD=ragpassword
      - POSTGRES_DB=ragdb
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - celery-worker
      - celery-extraction-worker
      - celery-enrichment-worker
    networks:
      - rag-network
    restart: unless-stopped

  # PostgreSQL Database with pgvector
  postgres:
    image: pgvector/pgvector:pg15
    container_name: rag-postgres
    environment:
      - POSTGRES_USER=raguser
      - POSTGRES_PASSWORD=ragpassword
      - POSTGRES_DB=ragdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network
    restart: unless-stopped

  # Redis (Message Broker & Cache)
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network
    restart: unless-stopped

  # MinIO (S3-compatible Object Storage)
  minio:
    image: minio/minio:latest
    container_name: rag-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - rag-network
    restart: unless-stopped

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: rag-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/rag-documents --ignore-existing;
      mc anonymous set download myminio/rag-documents;
      exit 0;
      "
    networks:
      - rag-network

  # Flower (Celery monitoring - Optional)
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-flower
    command: celery -A app.infrastructure.worker.celery_app flower --port=5555
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "5555:5555"
    depends_on:
      - celery-worker
      - celery-extraction-worker
    networks:
      - rag-network
    profiles:
      - debug
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  rag-network:
    driver: bridge
